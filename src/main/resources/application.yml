server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gns_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

gns:
  jwt:
    secret: gns-secret-key-2024-global-news-system-jwt
    expire: 7200
  newsapi:
    key: ecba080cf907493c9e117a67249d8977
    base-url: https://newsapi.org/v2
  upload:
    path: D:/code/global-news-system/uploads/avatar/   # 头像存储路径，改成你自己的路径
    url-prefix: /uploads/avatar/                        # 前端访问前缀
